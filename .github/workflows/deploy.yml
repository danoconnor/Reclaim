name: Deploy to App Store Connect

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build and Upload
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: .spm-packages
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Set up App Store Connect API key
        env:
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          mkdir -p ~/.private_keys
          echo "$APP_STORE_CONNECT_API_KEY" | base64 --decode \
            > ~/.private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8

      - name: Set up signing keychain
        env:
          DISTRIBUTION_CERT_P12: ${{ secrets.DISTRIBUTION_CERT_P12 }}
          DISTRIBUTION_CERT_PASSWORD: ${{ secrets.DISTRIBUTION_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security list-keychains -d user -s build.keychain login.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          echo "$DISTRIBUTION_CERT_P12" | base64 --decode > /tmp/cert.p12
          security import /tmp/cert.p12 -k build.keychain \
            -P "$DISTRIBUTION_CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/xcodebuild
          security set-key-partition-list -S apple-tool:,apple: -s \
            -k "$KEYCHAIN_PASSWORD" build.keychain
          rm /tmp/cert.p12

      - name: Set build number
        run: agvtool new-version -all ${{ github.run_number }}

      - name: Build archive
        run: |
          xcodebuild archive \
            -project Reclaim.xcodeproj \
            -scheme Reclaim \
            -configuration Release \
            -archivePath build/Reclaim.xcarchive \
            -destination 'generic/platform=iOS' \
            -clonedSourcePackagesDirPath .spm-packages \
            -authenticationKeyPath ~/.private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }} \
            -allowProvisioningUpdates \
            DEVELOPMENT_TEAM=U7MJ9CBUMD

      - name: Export and upload to App Store Connect
        run: |
          xcodebuild -exportArchive \
            -archivePath build/Reclaim.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/export \
            -authenticationKeyPath ~/.private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }} \
            -allowProvisioningUpdates

      - name: Clean up
        if: always()
        run: |
          security delete-keychain build.keychain
          rm -f ~/.private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8
