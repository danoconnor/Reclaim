name: PR Tests

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: .spm-packages
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Select simulator
        id: sim
        run: |
          UDID=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for rt in sorted(data['devices'].keys(), reverse=True):
              if 'iOS' not in rt:
                  continue
              for d in data['devices'][rt]:
                  if 'iPhone' in d.get('name', '') and d.get('isAvailable'):
                      print(d['udid'])
                      sys.exit(0)
          sys.exit(1)
          ")

          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: Run unit tests
        run: |
          xcodebuild test \
            -project Reclaim.xcodeproj \
            -scheme Reclaim \
            -destination 'platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}' \
            -only-testing:ReclaimTests \
            -clonedSourcePackagesDirPath .spm-packages

  ui-tests:
    name: UI Tests
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: .spm-packages
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Select simulator
        id: sim
        run: |
          UDID=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for rt in sorted(data['devices'].keys(), reverse=True):
              if 'iOS' not in rt:
                  continue
              for d in data['devices'][rt]:
                  if 'iPhone' in d.get('name', '') and d.get('isAvailable'):
                      print(d['udid'])
                      sys.exit(0)
          sys.exit(1)
          ")

          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: Boot simulator
        run: |
          xcrun simctl boot "${{ steps.sim.outputs.udid }}" 2>/dev/null || true
          xcrun simctl bootstatus "${{ steps.sim.outputs.udid }}" -b

      - name: Run UI tests
        run: |
          xcodebuild test \
            -project Reclaim.xcodeproj \
            -scheme Reclaim \
            -destination 'platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}' \
            -only-testing:ReclaimUITests \
            -clonedSourcePackagesDirPath .spm-packages \
            -parallel-testing-enabled NO
